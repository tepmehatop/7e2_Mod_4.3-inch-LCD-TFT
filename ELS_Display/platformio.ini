;PlatformIO Project Configuration File for ELS Display
;
; ESP32-2432S024 (2.4" TFT) - ВРЕМЕННЫЙ ДИСПЛЕЙ
; Потом будет JC4827W543 (4.3" TFT) - нужно просто поменять размеры
;
; Build: Ctrl+Alt+B
; Upload: Ctrl+Alt+U
; Serial Monitor: Ctrl+Alt+S

[platformio]
default_envs = jc4827w543

; ============================================================================
; ESP32-2432S024 (2.4" TFT 240x320) - ТЕКУЩИЙ
; ============================================================================
[env:esp32_2432s024]
platform = espressif32
board = esp32dev
framework = arduino

; Скорость Serial Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Скорость загрузки
upload_speed = 115200

; Библиотеки LVGL
lib_deps =
    lvgl/lvgl@^8.3.11
    bodmer/TFT_eSPI@^2.5.43

; Конфигурация дисплея ILI9341 (240x320)
build_flags =
    ; === ОСНОВНЫЕ НАСТРОЙКИ ===
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM

    ; === TFT_eSPI КОНФИГУРАЦИЯ ===
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1

    ; === РАЗМЕР ДИСПЛЕЯ (МОЖНО ЛЕГКО ПОМЕНЯТЬ) ===
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=240

    ; === ПИНЫ ПОДКЛЮЧЕНИЯ (ESP32-2432S024) ===
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=27

    ; === TOUCH SCREEN (XPT2046) ===
    -DTOUCH_CS=33
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000

    ; === ШРИФТЫ ===
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

    ; === LVGL НАСТРОЙКИ ===
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_LVGL_H_INCLUDE_SIMPLE=1
    -I.

; Partition scheme
board_build.partitions = default.csv
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L


; ============================================================================
; JC4827W543 (4.3" TFT 480x272) - НОВЫЙ ДИСПЛЕЙ
; ESP32-S3 + NV3041A (QSPI) + GT911 Touch
; ============================================================================
[env:jc4827w543]
; Используем pioarduino с Arduino Core 3.x для поддержки NV3041A
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.10/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; Скорость Serial Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Скорость загрузки
upload_speed = 921600

; USB CDC для Serial (ESP32-S3)
build_flags =
    ; === ESP32-S3 НАСТРОЙКИ ===
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0

    ; === ДИСПЛЕЙ JC4827W543 ===
    -DJC4827W543_DISPLAY=1
    -DSCREEN_WIDTH=480
    -DSCREEN_HEIGHT=272

    ; === ПИНЫ ДИСПЛЕЯ (NV3041A QSPI) ===
    -DTFT_CS=45
    -DTFT_SCK=47
    -DTFT_D0=21
    -DTFT_D1=48
    -DTFT_D2=40
    -DTFT_D3=39
    -DTFT_BL=1

    ; === ПИНЫ TOUCH (GT911 I2C) ===
    -DTOUCH_MODULES_GT911
    -DTOUCH_SCL=4
    -DTOUCH_SDA=8
    -DTOUCH_RST=38
    -DTOUCH_INT=3

    ; === LVGL НАСТРОЙКИ ===
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_LVGL_H_INCLUDE_SIMPLE=1
    -I.

; Библиотеки для JC4827W543
lib_deps =
    lvgl/lvgl@8.4.0
    moononournation/GFX Library for Arduino@^1.4.6
    https://github.com/mmMicky/TouchLib.git

; ESP32-S3 настройки памяти (4MB flash, huge_app = 3MB для кода)
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi
